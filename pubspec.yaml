name: visionary_ai
description: "Visionary AI - Accessibility-first mobile app for people with low vision"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.7.0

  # AI / Gemini - Firebase AI SDK
  firebase_ai: ^3.11.0

  # Image
  image_picker: ^1.2.2

  # TTS
  flutter_tts: ^4.2.5

  # State
  flutter_riverpod: ^3.3.1

  # Dependency Injection
  get_it: ^9.2.1

  # Routing
  go_router: ^17.2.3

  # Storage
  simple_secure_storage: ^0.4.1

  # UUID for history entries
  uuid: ^4.5.1

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/visionary_ia_icon_app.png"
  min_sdk_android: 21

flutter_native_splash:
  image: assets/icons/visionary_ia_icon_app.png
  color: "#ffffff"
  color_dark: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/
